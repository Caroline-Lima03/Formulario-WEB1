<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="" method="POST" autocomplete="on">

    <fieldset>
        <legend>Dados pessoais</legend>
        <p>
            <label for="inome" >Nome:</label><br>
            <input type="text" name="nome" id="inome" minlength="5" maxlength="20" required placeholder="Digite seu nome completo">
        </p>
        <p>
            <label for="iemail">E-mail:</label><br>
            <input type="email" name="email" id="iemail" autocomplete="email" required placeholder="seuemail@exemplo.com">
        </p>
        <p>
            <label for="itel">Telefone(formato (xx)xxxxx-xxxx):</label><br>
            <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" required placeholder="(11)91234-5678">
        </p>
        <p>
            <label for="isen">Crie uma senha: </label><br>
            <input type="password" name="sen" id="isen" required minlength="8" maxlength="20" size="15" placeholder="Mínimo 8 letras" autocomplete="current-password">
        <p>
            <label for="iage">Idade:</label><br>
            <input type="number" name="age" id="iage" autocomplete="age" step="1"  required placeholder="Sua idade">
        </p>
        <p><label for="iest">Estado de entrega</label><br>
            <select name="estado" id="iest">
                <option value="" selected> --Selecione seu Estado-- </option>
                <optgroup label="Região Sudeste">
                    <option value="MG">Minas Geais</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="SP">São Paulo</option>
                    <option value="ES">Espírito Santo</option>
                </optgroup>
                <optgroup label="Região Nordeste">
                    <option value="MA">Maranhão</option>
                    <option value="PE">Pernambuco</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="PI">Piauí</option>
                    <option value="CE">Ceará</option>
                    <option value="AL">Alagoas</option>
                    <option value="BA">Bahia</option>
                    <option value="PB">Paraíba</option>
                    <option value="SE">Sergipe</option>
                </optgroup>
                <optgroup label="Região Centro-Oeste">
                    <option value="DF">Distrito Federal</option>
                    <option value="GO">Goiás</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                </optgroup>
                <optgroup label="Norte">
                    <option value="AM">Amazonas</option>
                    <option value="AC">Acre</option>
                    <option value="PA">Pará</option>
                    <option value="AP">Amapá</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="TO">Tocantins</option>
                </optgroup>
                <optgroup label="Sul">
                    <option value="PR">Paraná</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="SC">Santa Catarina</option>
                </optgroup>
            </select>
        </p>
        <p><label for="ifoto">Envie uma foto:</label><br>
        <input class="preencher" type="file" name="foto" id="ifoto"></p>
    </fieldset><br><br>
    <fieldset>
        <legend>Escolha do Carro</legend>
        <p>Escolha o modelo:<br>
            <input type="radio" name="modelo" id="imods" value="BYD Seal"> <label for="isxmas">BYD Seal</label><br>
            <input type="radio" name="modelo" id="imodh" value="BYD Seal"> <label for="isxfem">BYD Han</label><br>
            <input type="radio" name="modelo" id="imodsp" value="BYD Seal"> <label for="isxfem">BYD Song Plus</label><br>
        </p>
        <p>Itens adicionais:<br>
            <input type="checkbox" name="som" id="isom"> <label for="isom">Som Premium</label><br>
            <input type="checkbox" name="ar" id="iar"> <label for="iar">Ar-condicionado Digital</label><br>
            <input type="checkbox" name="camera" id="icamera"> <label for="icamera">Câmera 360°</label><br>
        </p>
        <p>Cor do carro:<br>
            <label for="icor"></label>
            <input type="color" name="cor" id="icor" value="#000000">
        </p>
         <p>Intensidade da cor (brilho):<br>
            <label for="ibrilho"></label>
            <input type="range" id="ibrilho" min="1" max="5" value="2">
        </p>
     </fieldset><br><br>
     <fieldset>
        <legend>Entrega</legend>
         <p>
            <label for="idia">Data desejada para entrega:</label><br>
            <input type="date" name="dia" id="idia" value="dd-mm-aaaa">
        </p>
        <p>
            <label for="ihora">Hora preferida para entrega:</label><br>
            <input type="time" name="hora" id="ihora">
        </p>
         <p>
            <label for="imes">Mês da compra:</label><br>
            <input type="month" name="mes" id="imes" value="----de----">
        </p>
     </fieldset><br><br>
    <fieldset>
        <legend>Sua Opinião</legend>
        <p>
            <label for="imsg">Conte qual a sua expectativa sobre o carro:</label><br>
            <textarea name="" id="imsg" cols="30" rows="10" placeholder="Exemplo: Espero que o carro tenha boa autonomia, seja confortável, silencioso e impressione os vizinhos!"></textarea>
        </p>
     </fieldset><br><br>
    <fieldset>
       <legend>Avaliação de Modelos BYD</legend>
        <p>
            <label for="num1">Avalie o BYD Dolphin Plus</label><br>
            <input type="number" id ="num1" name="num1" min="0" max="5" step="1" placeholder="0 a 5 estrelas">
        </p>
        <p>
            <label for="num2">Avalie o BYD GS</label><br>
            <input type="number" id ="num2" name = "num2" min="0" max="5" step="1" placeholder="0 a 5 estrelas">
        </p>
        <p>
            <label for="num3">Avalie o BYD Mini</label><br>
            <input type="number" id ="num3"name = "num3" min="0" max="5" step="1" placeholder="0 a 5 estrelas">
        </p>
     </fieldset>


       <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
    
</form>
    
</body>
</html>
